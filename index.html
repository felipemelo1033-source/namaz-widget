<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            min-height: 100vh; 
            background-color: white; 
            font-family: 'Montserrat', sans-serif; 
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container { 
            width: 100%; 
		    height: 100vh; /* Nutzt exakt 100% der Bildschirmhöhe */
		    display: flex; 
		    flex-direction: column; 
		    align-items: center; 
		    padding: 20px;
		    box-sizing: border-box;
        }

        .logo-top { 
            width: 450px; 
            max-width: 70%; 
            height: auto; 
            margin-top: 20px; 
        }

        .title-red { 
            color: #cc0000; 
            font-size: clamp(40px, 7vw, 90px); 
            font-weight: 800; 
            margin: 10px 0 0px 0; 
            text-transform: uppercase; 
            text-align: center;
            width: 100%;
        }

        .city-picker {
			display: block; /* Standardmäßig sichtbar */
            margin-bottom: 5px; 
            z-index: 100; 
        }

        #city-select {
            padding: 5px 15px; 
            font-size: 18px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            font-family: 'Montserrat', sans-serif; 
            background: #f9f9f9; 
            color: #666;
            cursor: pointer;
        }

        .title-blue { 
            color: #72b1c4; 
            font-family: 'Oregano', cursive; 
            font-size: clamp(50px, 9vw, 110px); 
            margin: 0 0 5px 0; 
            text-align: center;
            width: 100%;
        }

        #hicri-tarih {
            font-size: clamp(20px, 4vw, 30px);
            color: #666;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .custom-widget { 
            background: #f9f9f9; 
            border-radius: 30px; 
            padding: clamp(20px, 5vw, 50px); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            width: 95%; 
            max-width: 1300px; 
            text-align: center; 
            border: 2px solid #eee; 
            box-sizing: border-box;
        }

        #countdown { 
            font-size: clamp(60px, 15vw, 150px); 
            font-weight: 800; 
            color: #cc0000; 
            font-variant-numeric: tabular-nums;
        }

        .vakit-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 10px; 
        }

        .vakit-item { 
            padding: 15px 5px; 
            background: white; 
            border-radius: 15px; 
            border: 1px solid #ddd; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .vakit-item.active { 
            border: 6px solid #cc0000; 
            background: #fffcfc; 
            transform: scale(1.05); 
        }

        .vakit-name { font-size: clamp(14px, 2vw, 24px); color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .vakit-time { font-size: clamp(18px, 3vw, 40px); font-weight: 800; color: #333; }

		/* Ayet Box */
        #ayet-container {
            display: none; margin-top: 20px; padding: 15px; background: #fdfdfd; 
            border: 1px solid #eee; border-left: 6px solid #cc0000; border-radius: 15px; 
            max-width: 1300px; width: 95%; text-align: left;
        }
        .ayet-label { color: #cc0000; font-weight: 800; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        #ayet-text { font-style: italic; font-size: clamp(16px, 2.5vw, 22px); color: #333; line-height: 1.6; }
        #ayet-quelle { text-align: right; color: #999; font-weight: bold; margin-top: 10px; font-size: 14px; }
		
		.footer {
			width: 100%;
			text-align: center;
			color: #cc0000;
			font-weight: 800;
			font-size: clamp(20px, 5vw, 25px);
			margin-top: 30px;
			padding-bottom: 10px;
		}

        @media (max-width: 768px) {
            .vakit-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .vakit-item { padding: 25px 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
	    <div class="city-picker">
            <select id="city-select" onchange="update()">
                <option value="reutlingen">Reutlingen</option>
                <option value="filderstadt">Filderstadt</option>
                <option value="nuertingen">Nürtingen</option>
            </select>
        </div>   
        <img src="logo_oben.svg" class="logo-top">
        <h1 class="title-red">NAMAZ VAKİTLERİ</h1>
        <h2 class="title-blue" id="city-title">Reutlingen</h2>
        
        <div id="hicri-tarih">--:--</div>

        <div class="custom-widget">
            <div id="countdown">00:00:00</div>
            <div class="vakit-grid">
                <div class="vakit-item" id="box-0"><div class="vakit-name">İmsak</div><div class="vakit-time" id="t-0">--:--</div></div>
                <div class="vakit-item" id="box-1"><div class="vakit-name">Güneş</div><div class="vakit-time" id="t-1">--:--</div></div>
                <div class="vakit-item" id="box-2"><div class="vakit-name">Öğle</div><div class="vakit-time" id="t-2">--:--</div></div>
                <div class="vakit-item" id="box-3"><div class="vakit-name">İkindi</div><div class="vakit-time" id="t-3">--:--</div></div>
                <div class="vakit-item" id="box-4"><div class="vakit-name">Akşam</div><div class="vakit-time" id="t-4">--:--</div></div>
                <div class="vakit-item" id="box-5"><div class="vakit-name">Yatsı</div><div class="vakit-time" id="t-5">--:--</div></div>
            </div>
        </div>

			<div id="ayet-container" class="custom-widget" style="display:none; margin-top: 40px; text-align: left;">
    			<div style="color: #cc0000; font-weight: 800; font-size: 14px; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Günün Ayeti veya Hadis-i Şerifi</div>
   				<div id="ayet-text" style="font-family: 'Montserrat'; font-style: italic; font-size: clamp(16px, 2.5vw, 22px); color: #333; line-height: 1.6; margin-bottom: 15px;"></div>
    			<div id="ayet-quelle" style="text-align: right; color: #888; font-weight: bold; font-size: 16px;"></div>
			</div>
		
        <div class="footer">BİZ BÜYÜK BİR AİLEYİZ!</div>
		
    </div>

    <script>
        let interval;

        async function update() {
           	const citySelect = document.getElementById('city-select');
			const pickerContainer = document.querySelector('.city-picker');
    
    		// URL prüfen: Steht da z.B. ?city=nuertingen ?
    		const urlParams = new URLSearchParams(window.location.search);
			if (urlParams.has('admin')) {
        		pickerContainer.style.display = 'none';
    		}
    		const urlCity = urlParams.get('city');

   			if (!window.initialLoadDone) {
        			if (urlCity) {
            			// Wenn in der URL eine Stadt steht, nimm diese
            			citySelect.value = urlCity;
        			} else {
            			// Sonst schau im Speicher (LocalStorage) nach
            			const savedCity = localStorage.getItem('userCity');
            			if (savedCity) citySelect.value = savedCity;
        			}
        			window.initialLoadDone = true;
    		}
			
            const selectedCity = citySelect.value;
            localStorage.setItem('userCity', selectedCity);

            // Titel im UI anpassen
            document.getElementById('city-title').innerText = citySelect.options[citySelect.selectedIndex].text;

			try {
   				 // Hier wird die Datei geladen!
    			const ayetRes = await fetch('./data/ayetler.json');
    			const ayetData = await ayetRes.json();

    			const now = new Date();
    			const dateStr = `${String(now.getDate()).padStart(2, '0')}.${String(now.getMonth() + 1).padStart(2, '0')}.${now.getFullYear()}`;

    			// JETZT folgt dein Block:
    			const ayet = ayetData[dateStr];
    			if (ayet) {
       				document.getElementById('ayet-text').innerText = ayet.text;
        			document.getElementById('ayet-quelle').innerText = "— " + ayet.quelle;
        			document.getElementById('ayet-container').style.display = 'block';
    			} else {
       				document.getElementById('ayet-container').style.display = 'none';
    			}
			} catch (e) {
    			console.error("Ayetler yüklenemedi", e);
			}

			
            try {
                // Lädt die JSON-Datei aus dem Unterordner /data/
                const response = await fetch(`./data/${selectedCity}.json`);
                if (!response.ok) throw new Error("JSON konnte nicht geladen werden");
                const allData = await response.json();

                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = now.getFullYear();
                const dateStr = `${d}.${m}.${y}`;

                const todayData = allData[dateStr];
                if (!todayData) {
                    document.getElementById('countdown').innerText = "Veri Yok";
                    return;
                }

                // Hicri Tarih und Vakitler setzen
                document.getElementById('hicri-tarih').innerText = todayData.hicri;
                const times = todayData.vakitler;

                let next = null;
                let nextIndex = -1;

                // Nächstes Gebet heute suchen
                for (let i = 0; i < 6; i++) {
                    const [h, min] = times[i].split(':').map(Number);
                    const pDate = new Date(now);
                    pDate.setHours(h, min, 0, 0);

                    if (!next && pDate > now) {
                        next = pDate;
                        nextIndex = i;
                    }
                    document.getElementById('t-' + i).innerText = times[i];
                    document.getElementById('box-' + i).classList.remove('active');
                }

                // Falls kein Gebet mehr heute -> Imsak morgen
                if (!next) {
                    const tomorrow = new Date(now);
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    const tStr = `${String(tomorrow.getDate()).padStart(2, '0')}.${String(tomorrow.getMonth() + 1).padStart(2, '0')}.${tomorrow.getFullYear()}`;
                    if (allData[tStr]) {
                        const tomorrowTimes = allData[tStr].vakitler;
                        const [h, min] = tomorrowTimes[0].split(':').map(Number);
                        next = new Date(tomorrow);
                        next.setHours(h, min, 0, 0);
                        nextIndex = 0;
                    }
                }

                if (nextIndex !== -1) {
                    document.getElementById('box-' + nextIndex).classList.add('active');
                    startCountdown(next);
                }

            } catch (err) {
                console.error("Hata:", err);
                document.getElementById('countdown').innerText = "Hata";
            }
        }

        function startCountdown(target) {
            if (interval) clearInterval(interval);
            interval = setInterval(() => {
                const diff = target - new Date();
                if (diff <= 0) {
                    clearInterval(interval);
                    update();
                    return;
                }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').innerText = 
                    `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }, 1000);
        }

        update();
    </script>
</body>
</html>

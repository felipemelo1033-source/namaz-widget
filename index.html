<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* --- GRUNDDESIGN --- */
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background-color: white; font-family: 'Montserrat', sans-serif; 
            display: flex; justify-content: center; overflow-x: hidden;
        }

        /* Hauptcontainer: Hält alles mittig auf dem Bildschirm */
        .container { 
            width: 100%; height: 100vh; display: flex; 
            flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
        }

        /* --- LOGO & TITEL --- */
        .logo-top { width: 450px; max-width: 60%; height: auto; margin-top: 10px; }

        .title-red { 
            color: #cc0000; font-size: clamp(30px, 6vw, 80px); font-weight: 800; 
            margin: 10px 0 5px 0; text-transform: uppercase; text-align: center;
        }

        /* Stadt-Auswahl-Menü Design */
        .city-picker { display: block; margin-bottom: 10px; z-index: 100; }
        #city-select {
            padding: 5px 15px; font-size: 18px; border-radius: 8px; 
            border: 1px solid #ddd; font-family: 'Montserrat', sans-serif; 
            background: #f9f9f9; color: #666; cursor: pointer;
        }

        .title-blue { 
            color: #72b1c4; font-family: 'Pacifico', cursive; 
            font-size: clamp(40px, 8vw, 100px); margin: 0 0 5px 0; text-align: center;
        }

        /* Hicri Datum Design */
        #hicri-tarih {
            font-size: clamp(18px, 4vw, 28px); color: #666; margin-bottom: 15px; font-weight: 800;
        }

        /* --- BOX-DESIGN (WIDGETS) --- */
        .custom-widget { 
            background: #f9f9f9; border-radius: 30px; padding: 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 95%; max-width: 1300px; 
            text-align: center; border: 2px solid #eee; box-sizing: border-box;
        }

        /* Countdown Schriftgröße */
        #countdown { 
            font-size: clamp(50px, 12vw, 130px); font-weight: 800; 
            color: #cc0000; margin-bottom: 20px; font-variant-numeric: tabular-nums;
        }

        /* Gitter für die 6 Gebetszeiten */
        .vakit-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; 
        }

        /* Einzelne Gebetszeit-Box */
        .vakit-item { 
            padding: 15px 5px; background: white; border-radius: 15px; 
            border: 1px solid #ddd; display: flex; flex-direction: column; justify-content: center;
        }

        /* Hervorhebung für die aktuelle/nächste Zeit */
        .vakit-item.active { border: 6px solid #cc0000; background: #fffcfc; transform: scale(1.05); }
        .vakit-name { font-size: clamp(12px, 2vw, 22px); color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .vakit-time { font-size: clamp(16px, 3vw, 38px); font-weight: 800; color: #333; }

        /* --- AYET BOX STYLING --- */
        #ayet-container {
            display: none; margin-top: 15px; text-align: left;
        }
        .ayet-label-box {
            color: #cc0000; font-weight: 800; font-size: 14px; text-transform: uppercase;
            letter-spacing: 1px; border-bottom: 1px solid #eee; padding-bottom: 5px;
        }
        #ayet-text {
            font-family: 'Montserrat', sans-serif; font-style: italic; font-size: 22px; 
            color: #333; line-height: 1.4; word-wrap: break-word;
        }
        #ayet-quelle { text-align: right; color: #888; font-weight: bold; font-size: 16px; }

        /* --- GROSSE BILDSCHIRME (TV / YODECK) --- */
        /* Diese Regeln gelten nur auf Monitoren mit mehr als 1200px Breite */
        @media screen and (min-width: 1200px) {
            #ayet-text { font-size: 55px; line-height: 1.2; }
            #ayet-quelle { font-size: 32px; }
            .ayet-label-box { font-size: 22px; }
            .custom-widget { padding: 20px; }
            .container { justify-content: flex-start; gap: 10px; }
        }

        .footer { 
            width: 100%; text-align: center; color: #cc0000; font-weight: 800; 
            font-size: clamp(18px, 4vw, 25px); margin-top: auto; padding-bottom: 20px;
        }

        /* Mobile Anpassung: Gebetszeiten untereinander (2er Spalten) */
        @media (max-width: 768px) {
            .vakit-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .vakit-item { padding: 15px 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="city-picker">
            <select id="city-select" onchange="update()">
                <option value="reutlingen">Reutlingen</option>
                <option value="filderstadt">Filderstadt</option>
                <option value="nuertingen">Nürtingen</option>
            </select>
        </div>   

        <img src="logo_oben.svg" class="logo-top">
        <h1 class="title-red">NAMAZ VAKİTLERİ</h1>
        <h2 class="title-blue" id="city-title">--</h2>
        <div id="hicri-tarih">--</div>

        <div class="custom-widget">
            <div id="countdown">00:00:00</div>
            <div class="vakit-grid">
                <div class="vakit-item" id="box-0"><div class="vakit-name">İmsak</div><div class="vakit-time" id="t-0">--:--</div></div>
                <div class="vakit-item" id="box-1"><div class="vakit-name">Güneş</div><div class="vakit-time" id="t-1">--:--</div></div>
                <div class="vakit-item" id="box-2"><div class="vakit-name">Öğle</div><div class="vakit-time" id="t-2">--:--</div></div>
                <div class="vakit-item" id="box-3"><div class="vakit-name">İkindi</div><div class="vakit-time" id="t-3">--:--</div></div>
                <div class="vakit-item" id="box-4"><div class="vakit-name">Akşam</div><div class="vakit-time" id="t-4">--:--</div></div>
                <div class="vakit-item" id="box-5"><div class="vakit-name">Yatsı</div><div class="vakit-time" id="t-5">--:--</div></div>
            </div>
        </div>

        <div id="ayet-container" class="custom-widget">
            <div class="ayet-label-box">Günün Ayeti / Hadis-i Şerifi</div>
            <div id="ayet-text"></div>
            <div id="ayet-quelle"></div>
        </div>      
        
        <div class="footer">BİZ BÜYÜK BİR AİLEYİZ!</div>
    </div>

    <script>
        let interval;
        window.lastDate = ""; // Hilfsvariable für den Datumswechsel-Check

        // --- HAUPTFUNKTION: LÄDT ALLE DATEN ---
        async function update() {
            const citySelect = document.getElementById('city-select');
            const pickerContainer = document.querySelector('.city-picker');
            const urlParams = new URLSearchParams(window.location.search);

            // Prüfen, ob das Menü ausgeblendet werden soll (?admin in URL)
            if (urlParams.has('admin')) { pickerContainer.style.display = 'none'; }

            // Stadt bestimmen (URL -> LocalStorage -> Dropdown)
            if (!window.initialLoadDone) {
                const urlCity = urlParams.get('city');
                if (urlCity) { citySelect.value = urlCity; }
                else {
                    const savedCity = localStorage.getItem('userCity');
                    if (savedCity) citySelect.value = savedCity;
                }
                window.initialLoadDone = true;
            }
            
            const city = citySelect.value;
            localStorage.setItem('userCity', city);
            document.getElementById('city-title').innerText = citySelect.options[citySelect.selectedIndex].text;

            // Cache-Buster: Erzwingt das Neuladen der JSON von GitHub (kein alter Cache)
            const cacheBuster = "?v=" + new Date().getTime();

            try {
                // Beide JSON-Dateien gleichzeitig abrufen
                const [cityRes, ayetRes] = await Promise.all([
                    fetch(`./data/${city}.json${cacheBuster}`),
                    fetch(`./data/ayetler.json${cacheBuster}`)
                ]);

                const cityData = await cityRes.json();
                const ayetData = await ayetRes.json();

                // Heutiges Datum im Format TT.MM.JJJJ erzeugen
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = now.getFullYear();
                const dateStr = `${d}.${m}.${y}`;
                window.lastDate = dateStr; // Für den Mitternachts-Check merken

                // Gebetszeiten für heute aus der JSON ziehen
                const today = cityData[dateStr];
                if (today) {
                    document.getElementById('hicri-tarih').innerText = today.hicri;
                    renderTimes(today.vakitler, cityData, now);
                }

                // Vers des Tages aus der JSON ziehen
                const ayet = ayetData[dateStr];
                if (ayet) {
                    document.getElementById('ayet-text').innerText = ayet.text;
                    document.getElementById('ayet-quelle').innerText = "— " + ayet.quelle;
                    document.getElementById('ayet-container').style.display = 'block';
                } else {
                    document.getElementById('ayet-container').style.display = 'none';
                }
            } catch (err) { console.error("Daten konnten nicht geladen werden:", err); }
        }

        // --- FUNKTION: ZEITEN ANZEIGEN & NÄCHSTE ZEIT FINDEN ---
        function renderTimes(times, allData, now) {
            let next = null; let nextIndex = -1;
            
            for (let i = 0; i < 6; i++) {
                const [h, min] = times[i].split(':').map(Number);
                const pDate = new Date(now); pDate.setHours(h, min, 0, 0);
                
                // Prüfen, ob dieses Gebet heute noch bevorsteht
                if (!next && pDate > now) { next = pDate; nextIndex = i; }
                
                document.getElementById('t-' + i).innerText = times[i];
                document.getElementById('box-' + i).classList.remove('active');
            }

            // Wenn kein Gebet heute mehr offen ist (nach Yatsı), nimm Imsak von morgen
            if (!next) {
                const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
                const tStr = `${String(tomorrow.getDate()).padStart(2, '0')}.${String(tomorrow.getMonth() + 1).padStart(2, '0')}.${tomorrow.getFullYear()}`;
                if (allData[tStr]) {
                    const [h, min] = allData[tStr].vakitler[0].split(':').map(Number);
                    next = new Date(tomorrow); next.setHours(h, min, 0, 0); nextIndex = 0;
                }
            }

            // Box markieren und Countdown starten
            if (nextIndex !== -1) {
                document.getElementById('box-' + nextIndex).classList.add('active');
                startCountdown(next);
            }
        }

        // --- FUNKTION: DER COUNTDOWN-TICKER ---
        function startCountdown(target) {
            if (interval) clearInterval(interval);
            interval = setInterval(() => {
                const diff = target - new Date();
                if (diff <= 0) { 
                    clearInterval(interval); 
                    update(); // Wenn Zeit abgelaufen, alles neu berechnen
                    return; 
                }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').innerText = 
                    `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }, 1000);
        }

        // --- AUTOMATISCHER TAGESWECHSEL-CHECK ---
        // Prüft jede Minute, ob wir ein neues Datum haben (z.B. nach Mitternacht)
        setInterval(() => {
            const n = new Date();
            const ds = `${String(n.getDate()).padStart(2, '0')}.${String(n.getMonth() + 1).padStart(2, '0')}.${n.getFullYear()}`;
            if (window.lastDate && window.lastDate !== ds) { 
                console.log("Tag gewechselt, lade neu...");
                update(); 
            }
        }, 60000);

        // Erster Aufruf beim Laden der Seite
        update();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            min-height: 100vh; 
            background-color: white; 
            font-family: 'Montserrat', sans-serif; 
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container { 
            width: 100%; 
            max-width: 1920px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-top { 
            width: 450px; 
            max-width: 70%; 
            height: auto; 
            margin-top: 20px; 
        }

        .title-red { 
            color: #cc0000; 
            font-size: clamp(40px, 7vw, 90px); 
            font-weight: 800; 
            margin: 20px 0 0 0; 
            text-transform: uppercase; 
            text-align: center;
            width: 100%;
        }

        .title-blue { 
            color: #72b1c4; 
            font-family: 'Oregano', cursive; 
            font-size: clamp(50px, 9vw, 110px); 
            margin: -10px 0 30px 0; 
            text-align: center;
            width: 100%;
        }

        .custom-widget { 
            background: #f9f9f9; 
            border-radius: 30px; 
            padding: clamp(20px, 5vw, 50px); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            width: 95%; 
            max-width: 1300px; 
            text-align: center; 
            border: 2px solid #eee; 
            box-sizing: border-box;
        }

        #countdown { 
            font-size: clamp(60px, 15vw, 150px); 
            font-weight: 800; 
            color: #cc0000; 
            margin-bottom: 30px; 
            font-variant-numeric: tabular-nums;
        }

        .vakit-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 10px; 
        }

        .vakit-item { 
            padding: 15px 5px; 
            background: white; 
            border-radius: 15px; 
            border: 1px solid #ddd; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .vakit-item.active { 
            border: 6px solid #cc0000; 
            background: #fffcfc; 
            transform: scale(1.05); 
        }

        .vakit-name { font-size: clamp(14px, 2vw, 24px); color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .vakit-time { font-size: clamp(18px, 3vw, 40px); font-weight: 800; color: #333; }

        .footer { 
            width: 100%; 
            text-align: center; 
            color: #cc0000; 
            font-weight: 800; 
            font-size: clamp(20px, 5vw, 55px); 
            margin-top: 50px; 
            padding-bottom: 30px;
        }

        /* Handy-Anpassung: 2 Spalten für die Gebetszeiten */
        @media (max-width: 768px) {
            .vakit-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .vakit-item { padding: 25px 10px; }
        }
    </style>
</head>

        function update() {
            const now = new Date();
            let d = String(now.getDate()).padStart(2, '0');
            let m = String(now.getMonth() + 1).padStart(2, '0');
            let y = now.getFullYear();
            let dateStr = `${d}.${m}.${y}`;

            let times = vakitler[dateStr];
            if (!times) return;

            let next = null;
            let nextIndex = -1;

            // Suche heutiges Gebet
            for (let i = 0; i < 6; i++) {
                const [h, min] = times[i].split(':').map(Number);
                const pDate = new Date(now);
                pDate.setHours(h, min, 0, 0);

                if (!next && pDate > now) {
                    next = pDate;
                    nextIndex = i;
                }
            }

            // Wenn nach Yatsı -> Morgen Imsak
            if (!next) {
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tStr = `${String(tomorrow.getDate()).padStart(2, '0')}.${String(tomorrow.getMonth() + 1).padStart(2, '0')}.${tomorrow.getFullYear()}`;
                if (vakitler[tStr]) {
                    times = vakitler[tStr];
                    const [h, min] = times[0].split(':').map(Number);
                    next = new Date(tomorrow);
                    next.setHours(h, min, 0, 0);
                    nextIndex = 0;
                }
            }

            // Boxen füllen
            for (let i = 0; i < 6; i++) {
                document.getElementById('t-' + i).innerText = times[i];
                document.getElementById('box-' + i).classList.remove('active');
            }
            if (nextIndex !== -1) {
                document.getElementById('box-' + nextIndex).classList.add('active');
                startCountdown(next);
            }
        }

        let interval;
        function startCountdown(target) {
            if (interval) clearInterval(interval);
            interval = setInterval(() => {
                const diff = target - new Date();
                if (diff <= 0) {
                    clearInterval(interval);
                    update();
                    return;
                }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').innerText = 
                    `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }, 1000);
        }
